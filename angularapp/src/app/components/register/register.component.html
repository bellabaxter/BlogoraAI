<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-logo">Mindful Muses</h1>
    <h2 class="auth-title">Join us.</h2>
    <p class="auth-subtitle">Create an account to start writing.</p>
    
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Name</label>
        <input type="text" formControlName="name" class="form-input" placeholder="Your full name" />
        <div class="error" *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
          Name is required
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" class="form-input" placeholder="Your email address" />
        <div class="error" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Please enter a valid email
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" class="form-input" placeholder="Create a password" />
        <div class="error" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Password is required
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" formControlName="confirmPassword" class="form-input" placeholder="Confirm your password" />
        <div class="error" *ngIf="registerForm.get('confirmPassword')?.errors?.['mismatch'] && registerForm.get('confirmPassword')?.touched">
          Passwords do not match
        </div>
      </div>

      <button type="submit" class="submit-btn" [disabled]="registerForm.invalid">Create Account</button>

      <p class="switch-auth">
        Already have an account? <a routerLink="/login">Sign In</a>
      </p>
    </form>
  </div>
</div>
