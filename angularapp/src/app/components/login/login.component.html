<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-logo">Mindful Muses</h1>
    <h2 class="auth-title">Welcome back.</h2>
    <p class="auth-subtitle">Sign in to access your posts.</p>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" formControlName="email" class="form-input" placeholder="Enter your email" required>
        <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error">
          Please enter a valid email.
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" formControlName="password" class="form-input" placeholder="Enter your password" required>
        <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error">
          Password is required.
        </div>
      </div>
      
      <button type="submit" class="submit-btn" [disabled]="loginForm.invalid">Sign In</button>
      <div *ngIf="errorMessage" class="error server-error">{{ errorMessage }}</div>
      
      <p class="switch-auth">
        No account? <a routerLink="/register">Create one</a>
      </p>
    </form>
  </div>
</div>
