
  <div class="analytics-page">
    <section class="analytics-hero">
      <div class="analytics-hero-copy">
        <span class="section-label">Analytics</span>
        <h1>Post performance</h1>
        <p>Review how many times this post has been viewed and keep the engagement data aligned with your content strategy.</p>
      </div>
    </section>

    <main class="analytics-content">
      <div class="analytics-card">
        <div class="analytics-card-header">
          <span>Post ID</span>
          <strong>{{ postId || '—' }}</strong>
        </div>

        <div class="analytics-metric-row">
          <div class="analytics-metric">
            <span class="metric-value">{{ viewCount }}</span>
            <span class="metric-label">Total Views</span>
          </div>
        </div>

        <p class="analytics-note">
          This number is sourced from the analytics service and updates each time a reader views the post.
        </p>
      </div>
    </main>
  </div>
